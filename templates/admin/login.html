{% extends "base.html" %}

{% block title %}Вход в админ-панель — TestLearn{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Вход в админ-панель
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Пожалуйста, войдите чтобы управлять содержимым платформы
            </p>
        </div>

        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-400 p-4 rounded">
            <div class="flex">
                <div class="ml-3">
                    <p class="text-sm text-red-700">{{ error }}</p>
                </div>
            </div>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="/admin/login" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">
                    Имя пользователя
                </label>
                <div class="mt-1">
                    <input id="username" name="username" type="text" required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                        placeholder="Введите имя пользователя">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">
                    Пароль
                </label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                        placeholder="Введите пароль">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Войти
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Возвращаетесь на основной сайт?
            <a href="/" class="font-medium text-indigo-600 hover:text-indigo-500">
                На главную
            </a>
        </p>
    </div>
</div>
{% endblock %}
